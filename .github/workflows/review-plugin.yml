name: Review Community Plugin

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  check-trigger:
    runs-on: ubuntu-latest
    outputs:
      triggered: ${{ steps.check.outputs.triggered }}
      pr_number: ${{ steps.check.outputs.pr_number }}
    steps:
      - name: Check trigger
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const comment = context.payload.comment.body.trim();
            const isPr = !!context.payload.issue.pull_request;
            const triggered = isPr && /^@tubabot\s+review\b/i.test(comment);
            core.setOutput('triggered', String(triggered));
            core.setOutput('pr_number', String(context.payload.issue.number));

      - name: Acknowledge
        if: steps.check.outputs.triggered == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: '🔍 **TubaBot** 正在扫描病毒，请稍候...'
            });

  virus-scan:
    needs: check-trigger
    if: needs.check-trigger.outputs.triggered == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Get PR info
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number('${{ needs.check-trigger.outputs.pr_number }}')
            });
            core.setOutput('head_sha', pr.head.sha);

      - name: Checkout main (for scripts/rules)
        uses: actions/checkout@v4
        with:
          path: bot

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          path: pr

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Collect files from PR
        id: collect
        working-directory: pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p scan-dir
          python3 ../bot/scripts/collect-pr-files.py "${{ needs.check-trigger.outputs.pr_number }}" scan-dir

      - name: Install ClamAV
        run: sudo apt-get update && sudo apt-get install -y clamav

      - name: Update virus database
        run: sudo freshclam --quiet || true
        timeout-minutes: 5

      - name: ClamAV Scan
        working-directory: pr
        run: |
          mkdir -p results
          clamscan --recursive --infected --log=results/clamav.log scan-dir/ 2>&1 || true
          echo "--- ClamAV results ---"
          cat results/clamav.log || echo "No log"

      - name: Install YARA
        run: sudo apt-get install -y yara

      - name: YARA Scan
        working-directory: pr
        run: |
          yara -r ../bot/rules/malware.yar scan-dir/ > results/yara.txt 2>&1 || true
          echo "--- YARA results ---"
          cat results/yara.txt || echo "No matches"

      - name: VirusTotal Check
        working-directory: pr
        env:
          VT_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: |
          if [ -z "$VT_API_KEY" ]; then
            echo '{"status":"skip"}' > results/virustotal.json
          else
            python3 ../bot/scripts/virustotal-check.py scan-dir/ > results/virustotal.json 2>&1 || true
          fi

      - name: Generate report and post
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            function readText(p) { try { return fs.readFileSync(p, 'utf8'); } catch { return ''; } }
            function readJson(p) { try { return JSON.parse(fs.readFileSync(p, 'utf8')); } catch { return null; } }

            const resultsDir = 'pr/results';
            const clamavLog = readText(path.join(resultsDir, 'clamav.log'));
            const yaraText = readText(path.join(resultsDir, 'yara.txt'));
            const vtResult = readJson(path.join(resultsDir, 'virustotal.json'));

            // Parse ClamAV
            const clamavInfected = (clamavLog.match(/FOUND/g) || []).length;
            const clamavStatus = clamavInfected > 0 ? '❌' : '✅';
            const clamavDetail = clamavInfected > 0 ? `发现 ${clamavInfected} 个威胁` : '未发现威胁';

            // Parse YARA
            const yaraHits = yaraText.trim().split('\n').filter(l => l.trim()).length;
            const yaraStatus = yaraHits > 0 ? '⚠️' : '✅';
            const yaraDetail = yaraHits > 0 ? `${yaraHits} 条规则匹配` : '无匹配';

            // Parse VirusTotal
            let vtStatus = '⏭️';
            let vtDetail = '未配置';
            if (vtResult && vtResult.status !== 'skip') {
              const positives = vtResult.positives || 0;
              const total = vtResult.total || 0;
              vtDetail = `${positives}/${total} 引擎报毒`;
              if (positives >= 3) vtStatus = '❌';
              else if (positives >= 1) vtStatus = '⚠️';
              else vtStatus = '✅';
            }

            // Overall
            const hasFail = clamavStatus === '❌' || vtStatus === '❌';
            const hasWarn = yaraStatus === '⚠️' || vtStatus === '⚠️';
            const overall = hasFail ? '❌' : (hasWarn ? '⚠️' : '✅');

            let report = `## 🔍 病毒扫描报告\n\n`;
            report += `| 扫描引擎 | 状态 | 结果 |\n`;
            report += `|----------|------|------|\n`;
            report += `| ClamAV | ${clamavStatus} | ${clamavDetail} |\n`;
            report += `| YARA | ${yaraStatus} | ${yaraDetail} |\n`;
            report += `| VirusTotal | ${vtStatus} | ${vtDetail} |\n\n`;

            if (clamavInfected > 0) {
              report += `### 🚨 ClamAV 检测详情\n`;
              for (const line of clamavLog.split('\n')) {
                if (line.includes('FOUND')) report += `- \`${line.trim()}\`\n`;
              }
              report += '\n';
            }

            if (yaraHits > 0) {
              report += `### ⚠️ YARA 匹配详情\n`;
              for (const line of yaraText.trim().split('\n').slice(0, 10)) {
                if (line.trim()) report += `- \`${line.trim()}\`\n`;
              }
              if (yaraHits > 10) report += `- ... 还有 ${yaraHits - 10} 条\n`;
              report += '\n';
            }

            if (vtResult && vtResult.files) {
              const flagged = vtResult.files.filter(f => (f.positives || 0) > 0);
              if (flagged.length > 0) {
                report += `### 🛡️ VirusTotal 报毒详情\n`;
                for (const f of flagged) {
                  report += `- **${f.file}**: ${f.positives}/${f.total} [查看](${f.permalink || ''})\n`;
                }
                report += '\n';
              }
            }

            if (overall === '✅') {
              report += `**结论**: ✅ 未发现病毒，可以合并。\n\n`;
            } else if (overall === '❌') {
              report += `**结论**: ❌ 检测到病毒，请勿合并！\n\n`;
            } else {
              report += `**结论**: ⚠️ 存在可疑特征，建议人工复核。\n\n`;
            }

            report += `*此报告由 **TubaBot** 自动生成。*`;

            const prNumber = Number('${{ needs.check-trigger.outputs.pr_number }}');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: report
            });

            // Apply label
            const label = overall === '✅' ? 'verified' : (overall === '❌' ? 'malware-detected' : 'needs-review');
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: [label]
            });
            for (const l of ['verified', 'needs-review', 'malware-detected'].filter(x => x !== label)) {
              try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber, name: l }); } catch {}
            }
