name: Auto-approve benchmark reports

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'reports/**'
  push:
    branches: [main]
    paths:
      - 'reports/**'

jobs:
  auto-approve:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Check PR title
        id: check-title
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          if [[ "$TITLE" == "[性能报告]"* ]] || [[ "$TITLE" == "[删除报告]"* ]]; then
            echo "is_benchmark=true" >> $GITHUB_OUTPUT
            if [[ "$TITLE" == "[性能报告]"* ]]; then
              echo "pr_type=upload" >> $GITHUB_OUTPUT
            else
              echo "pr_type=delete" >> $GITHUB_OUTPUT
            fi
          else
            echo "is_benchmark=false" >> $GITHUB_OUTPUT
            echo "Skipping: PR title does not match benchmark pattern"
          fi

      - name: Get changed files
        id: changed-files
        if: steps.check-title.outputs.is_benchmark == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const allInReports = files.every(f => f.filename.startsWith('reports/'));
            const allJson = files.every(f => f.filename.endsWith('.json'));
            const allSmall = files.every(f => f.changes <= 200);
            const fileCount = files.length;

            core.setOutput('all_in_reports', allInReports);
            core.setOutput('all_json', allJson);
            core.setOutput('all_small', allSmall);
            core.setOutput('file_count', fileCount);

            const addedOrModified = files
              .filter(f => f.status === 'added' || f.status === 'modified')
              .map(f => ({ filename: f.filename, sha: f.sha }));
            core.setOutput('added_files', JSON.stringify(addedOrModified));

      - name: Validate JSON structure
        if: steps.check-title.outputs.is_benchmark == 'true'
        id: validate-json
        uses: actions/github-script@v7
        with:
          script: |
            const prType = '${{ steps.check-title.outputs.pr_type }}';

            if (prType === 'delete') {
              core.setOutput('valid', 'true');
              core.info('Delete PR - skipping content validation');
              return;
            }

            const addedFiles = JSON.parse('${{ steps.changed-files.outputs.added_files }}' || '[]');
            if (addedFiles.length === 0) {
              core.setOutput('valid', 'true');
              return;
            }

            const requiredFields = ['id', 'author', 'cpuName', 'gpuName', 'gamingScore', 'officeScore'];

            for (const file of addedFiles) {
              const { data: blob } = await github.rest.git.getBlob({
                owner: context.repo.owner,
                repo: context.repo.repo,
                file_sha: file.sha,
              });

              const content = Buffer.from(blob.content, 'base64').toString('utf8');
              let json;
              try {
                json = JSON.parse(content);
              } catch {
                core.setFailed(`Invalid JSON in ${file.filename}`);
                return;
              }

              const missing = requiredFields.filter(f => json[f] === undefined || json[f] === null);
              if (missing.length > 0) {
                core.setFailed(`Missing fields [${missing.join(', ')}] in ${file.filename}`);
                return;
              }
            }

            core.setOutput('valid', 'true');

      - name: Merge PR
        if: |
          steps.check-title.outputs.is_benchmark == 'true' &&
          steps.changed-files.outputs.all_in_reports == 'true' &&
          steps.changed-files.outputs.all_json == 'true' &&
          steps.changed-files.outputs.all_small == 'true' &&
          steps.changed-files.outputs.file_count > 0 &&
          steps.validate-json.outputs.valid == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'merge',
              commit_title: `${context.payload.pull_request.title} (auto-merged)`,
              commit_message: 'Auto-merged: benchmark report PR passed validation checks.'
            });
            core.info('PR merged successfully');

  rebuild-leaderboard:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild leaderboard.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const reportsDir = path.join(process.env.GITHUB_WORKSPACE, 'reports');
            if (!fs.existsSync(reportsDir)) {
              core.info('No reports directory found, creating empty leaderboard');
              const empty = { updatedAt: new Date().toISOString(), reports: [], leaderboards: {} };
              fs.writeFileSync('leaderboard.json', JSON.stringify(empty, null, 2));
              return;
            }

            const reports = [];

            function walkDir(dir, authorFromDir) {
              const entries = fs.readdirSync(dir, { withFileTypes: true });
              for (const entry of entries) {
                const fullPath = path.join(dir, entry.name);
                if (entry.isDirectory()) {
                  walkDir(fullPath, entry.name);
                } else if (entry.isFile() && entry.name.endsWith('.json')) {
                  try {
                    const content = fs.readFileSync(fullPath, 'utf8');
                    const data = JSON.parse(content);
                    if (data.id && data.author && data.cpuName && data.gpuName) {
                      data.repoPath = path.relative(process.env.GITHUB_WORKSPACE, fullPath).replace(/\\/g, '/');
                      reports.push(data);
                    }
                  } catch (e) {
                    core.warning(`Failed to parse ${fullPath}: ${e.message}`);
                  }
                }
              }
            }

            walkDir(reportsDir, '');

            function computeRanking(reports, sortKey) {
              return [...reports]
                .sort((a, b) => (b[sortKey] || 0) - (a[sortKey] || 0))
                .map((r, i) => ({
                  rank: i + 1,
                  id: r.id,
                  author: r.author,
                  cpuName: r.cpuName,
                  gpuName: r.gpuName,
                  gamingScore: r.gamingScore || 0,
                  officeScore: r.officeScore || 0,
                  cpuSingleCoreScore: r.cpuSingleCoreScore || 0,
                  cpuMultiCoreScore: r.cpuMultiCoreScore || 0,
                  gpuRenderScore: r.gpuRenderScore || 0,
                  memoryCapacityScore: r.memoryCapacityScore || 0,
                  diskSeqReadScore: r.diskSeqReadScore || 0,
                  diskSeqWriteScore: r.diskSeqWriteScore || 0,
                  disk4KReadScore: r.disk4KReadScore || 0,
                  disk4KWriteScore: r.disk4KWriteScore || 0,
                  browserTotalScore: r.browserTotalScore || 0,
                  gamingGrade: r.gamingGrade || '',
                  officeGrade: r.officeGrade || '',
                  submittedAt: r.submittedAt || '',
                  osName: r.osName || '',
                  motherboardName: r.motherboardName || '',
                  memoryInfo: r.memoryInfo || '',
                  diskInfo: r.diskInfo || '',
                  displayInfo: r.displayInfo || '',
                  repoPath: r.repoPath || ''
                }));
            }

            const leaderboards = {
              gaming: computeRanking(reports, 'gamingScore'),
              office: computeRanking(reports, 'officeScore'),
              cpu: computeRanking(reports, 'cpuMultiCoreScore'),
              gpu: computeRanking(reports, 'gpuRenderScore'),
              disk: computeRanking(reports, 'diskSeqReadScore'),
              browser: computeRanking(reports, 'browserTotalScore')
            };

            const result = {
              updatedAt: new Date().toISOString(),
              totalReports: reports.length,
              leaderboards: leaderboards
            };

            fs.writeFileSync('leaderboard.json', JSON.stringify(result, null, 2));
            core.info(`Leaderboard rebuilt with ${reports.length} reports`);

      - name: Commit leaderboard.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leaderboard.json
          git diff --cached --quiet || git commit -m "chore: update leaderboard.json [skip ci]"
          git push
